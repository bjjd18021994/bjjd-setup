replicaCount: 1

image:
  repository: quay.io/keycloak/keycloak
  tag: "26.0"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

resources:
  limits:
    cpu: 2000m
    memory: 2000Mi
  requests:
    cpu: 500m
    memory: 1700Mi

postgres:
  host: "bjjd-postgres-postgresql.default.svc.cluster.local"
  port: 5432
  dbName: "keycloak_db"
  username: "keycloak"
  password: "keycloak@9379"

admin:
  username: "admin"
  password: "admin123"

persistence:
  enabled: true
  accessMode: ReadWriteOnce
  size: 5Gi
  storageClass: "local-path"
 # existingClaim: ""
 # hostPath: /run/desktop/mnt/host/c/k8s-data/keycloak

